<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QRコード受付システム</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* セーフエリア対応 */
        .pb-safe {
            padding-bottom: env(safe-area-inset-bottom, 1rem);
        }
        .pt-safe {
            padding-top: env(safe-area-inset-top, 1rem);
        }
    </style>
</head>
<body class="bg-slate-950 text-white font-sans overflow-hidden select-none h-screen w-full flex justify-center items-center">
    <!-- エラー時のポップアップ通知 -->
    <div id="toast-error" class="absolute top-[230px] left-auto right-auto w-[320px] z-50 bg-red-950 border border-red-500/40 rounded-2xl p-4 shadow-[0_10px_30px_rgba(0,0,0,0.5)] flex items-center gap-3.5 transform translate-y-20 opacity-100 pointer-events-none transition-all duration-500 backdrop-blur-md">
        <!-- アイコン -->
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-10 text-red-500">
            <path stroke-linecap="round" stroke-linejoin="round" d="m9.75 9.75 4.5 4.5m0-4.5-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
        </svg>

        <!-- メッセージ -->
        <div class="flex-1">
            <div class="text-sm text-red-500 font-bold mt-0.5 mb-1">
                エラーが発生しました
            </div>
            <div id="toast-error-message" class="text-slate-100">
                Error: このアドレスは無効、またはアクセス権限がありません。
            </div>
        </div>
    </div>
</body>
</html>
